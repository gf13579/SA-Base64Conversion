name: Update - UCC Build and AppInspect on Feature Push

on:
  push:
    branches:
      - 'feature/*'

jobs:
  build-and-inspect:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x' # Use a suitable Python version, e.g., '3.9', '3.10', '3.11'

    - name: Install Python dependencies
      run: |
        pip install splunk-add-on-ucc-framework
        pip install splunk-appinspect

    - name: Run UCC Gen Build
      run: ucc-gen build --source package

    - name: Insert sys.path modification into b64.py
      # to allow splunklib etc. to reside in the app's lib/ folder
      run: |
        sed -i '/import import_declare_test/a\import os\nsys.path.insert(0, os.path.join(os.path.dirname(__file__), "..", "lib"))  # nopep8' output/SA-Base64Conversion/bin/b64.py

    - name: Create archive folder
      run: |
        mkdir archive

    - name: Run UCC Gen Package
      run: ucc-gen package --path 'output/${{ github.event.repository.name }}' --output archive

    - name: Run Splunk AppInspect Check
      uses: splunk/appinspect-cli-action@v1
      with:
        app_path: 'archive'
        excluded_tags: 'manual'
